<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anion Gap to pH (Rough Estimate)</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    .calculator {
      background: #ffffff;
      padding: 20px;
      width: 100%;
      max-width: 500px;
      margin: auto;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }

    .calculator h2 {
      margin-top: 0;
      margin-bottom: 15px;
      font-size: 1.4em;
      text-align: center;
    }

    .calculator label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }

    .calculator input[type="number"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 1.1em;
      box-sizing: border-box;
    }

    .calculator button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background-color: #0078d4;
      color: white;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
    }

    .calculator button:hover {
      background-color: #005ea6;
    }

    .result {
      margin-top: 18px;
      font-size: 1.2em;
      font-weight: bold;
      text-align: center;
    }

    .note {
      margin-top: 12px;
      font-size: 0.85em;
      color: #555;
      text-align: center;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      body {
        padding: 10px;
      }
      .calculator {
        padding: 16px;
        border-radius: 8px;
      }
    }
  </style>
</head>

<body>

<div class="calculator">
  <h2>Anion Gap → pH (Rough Linear Estimate)</h2>

  <label for="agInput">Anion Gap (mmol/L)</label>
  <input type="number" id="agInput" step="0.1" placeholder="Enter AG value">

  <button onclick="calculatePH()">Calculate pH</button>

  <div class="result" id="result"></div>

  <div class="note">
    Formula: pH ≈ 7.45 − 0.00833 × (AG − 3)<br>
    This is a mathematical approximation, not a physiological model.
  </div>
</div>

<script>
  function calculatePH() {
    const agValue = parseFloat(document.getElementById('agInput').value);
    const resultDiv = document.getElementById('result');

    if (isNaN(agValue)) {
      resultDiv.textContent = "Please enter a valid anion gap value.";
      return;
    }

    const ph = 7.45 - 0.00833 * (agValue - 3);
    resultDiv.textContent = "Estimated pH: " + ph.toFixed(3);
  }

  // Allow Enter key to trigger calculation
  document.getElementById("agInput").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      event.preventDefault();
      calculatePH();
    }
  });
</script>

</body>
</html>

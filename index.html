<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anion Gap to pH (Rough Estimate)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #f5f5f5;
    }
    .calculator {
      background: #ffffff;
      padding: 20px;
      max-width: 400px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .calculator h2 {
      margin-top: 0;
      margin-bottom: 10px;
    }
    .calculator label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
    }
    .calculator input[type="number"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
    .calculator button {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      background-color: #0078d4;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .calculator button:hover {
      background-color: #005ea6;
    }
    .result {
      margin-top: 15px;
      font-size: 1.1em;
      font-weight: bold;
    }
    .note {
      margin-top: 10px;
      font-size: 0.85em;
      color: #555;
    }
  </style>
</head>
<body>

<div class="calculator">
  <h2>Anion Gap → pH (Rough Linear Estimate)</h2>
  <label for="agInput">Anion Gap (mmol/L)</label>
  <input type="number" id="agInput" step="0.1" placeholder="Enter AG value">

  <button onclick="calculatePH()">Calculate pH</button>

  <div class="result" id="result"></div>
  <div class="note">
    Formula: pH ≈ 7.45 − 0.00833 × (AG − 3)<br>
    This is a purely mathematical, rough linear mapping and not physiologically accurate.
  </div>
</div>

<script>
  function calculatePH() {
    const agValue = parseFloat(document.getElementById('agInput').value);
    const resultDiv = document.getElementById('result');

    if (isNaN(agValue)) {
      resultDiv.textContent = "Please enter a valid anion gap value.";
      return;
    }

    // Linear mapping: pH ≈ 7.45 - 0.00833 * (AG - 3)
    const ph = 7.45 - 0.00833 * (agValue - 3);

    resultDiv.textContent = "Estimated pH: " + ph.toFixed(3);
  }
</script>

</body>
</html>
